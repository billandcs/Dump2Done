project:
  name: Dump2Done
  output_root: output/jobs
  cache_mode: reuse
  debug: true

platform:
  profile: qualcomm_windows_arm64
  accelerator_priority:
    - cpu_int8
    - onnxruntime_qnn_future
    - onnxruntime_directml_future
  avoid:
    - cuda
    - nvenc
    - tensorrt
    - vllm_local

pipeline:
  chunk_duration_sec: 180
  max_parallel_workers: 1
  resume: true

media:
  temp_dir: null
  extract_audio_sample_rate: 16000
  extract_audio_channels: 1

asr:
  backend: faster_whisper
  model_size: small
  device: cpu
  compute_type: int8
  word_timestamps: true
  cpu_threads: 8
  num_workers: 1

llm:
  backend: ollama
  base_url: http://127.0.0.1:11434
  model: gpt-oss-20b-bench:latest
  structured_output: true
  chunk_duration_sec: 180
  top_n_candidates_per_chunk: 3
  global_top_n: 3
  min_duration: 20
  max_duration: 75

vision:
  backend: center_crop
  fallback_backend: opencv_future
  detection_fps: 1
  confidence_threshold: 0.5
  smoothing:
    method: ema
    alpha: 0.2
    dead_zone_ratio: 0.1
    max_movement_ratio_per_sec: 0.25

crop:
  target_format: 9:16
  strategy: center_crop_first
  fallback: center_crop

subtitles:
  format: ass
  language: auto
  font_family: Microsoft JhengHei
  font_size: auto
  outline: 3
  shadow: 1
  max_chars_per_line_cjk: 12
  max_words_per_line_en: 5
  keyword_highlight: true

music:
  enabled: false
  library_path: assets/music
  ducking_db: -12
  fade_in_sec: 0.5
  fade_out_sec: 1.0

voiceover:
  enabled: false
  backend: none
  voice: default
  language: auto

render:
  backend: ffmpeg
  target_format: 9:16
  fps: 30
  resolution:
    "9:16": [720, 1280]
    "1:1": [720, 720]
    "16:9": [1280, 720]
  encoder_preference:
    - libx264
    - libx265
  video_bitrate: 4M
  audio_codec: aac
  audio_bitrate: 160k

future_acceleration:
  onnxruntime:
    qnn:
      enabled: false
      provider: QNNExecutionProvider
      backend_type: htp
      note: Enable only for quantized static-shape ONNX models after provider validation.
    directml:
      enabled: false
      provider: DmlExecutionProvider
      note: Candidate for ONNX vision/embedding models on Qualcomm Adreno.

